name: Publish to NPM Registry

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can commit back
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Auto Bump Already-Published Versions
        run: bun run scripts/bump-versions.ts

      - name: Commit and Push Bumped Versions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain packages)" ]; then
            git add packages/
            git commit -m "chore: auto-bump package versions [skip ci]"
            git push origin main
          else
            echo "No version bump needed."
          fi

      - name: Build Packages
        run: bun run build

      - name: Setup Node (for NPM publishing auth)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Automatically publish each workspace package to NPM
      # Note: Scoped packages (@dev-sujay/*) publish as private by default.
      # If you want them public, add '--access public' to the publish commands.
      - name: Publish Packages to NPM
        run: |
          npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN
          
          echo "Publishing @dev-sujay/omnitracker..."
          cd packages/core && npm publish --access public
          
          echo "Publishing @dev-sujay/omnitracker-server..."
          cd ../server && npm publish --access public
          
          echo "Publishing @dev-sujay/omnitracker-react-admin..."
          cd ../react-admin && npm publish --access public
          
          echo "Publishing @dev-sujay/omnitracker-extension-scroll..."
          cd ../extension-scroll && npm publish --access public
          
          echo "Publishing @dev-sujay/omnitracker-extension-rage-click..."
          cd ../extension-rage-click && npm publish --access public
          
          echo "Publishing @dev-sujay/omnitracker-extension-replay..."
          cd ../extension-replay && npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

